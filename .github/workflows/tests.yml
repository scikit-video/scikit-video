name: tests

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff, pyflakes rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip ruff
          ruff check skvideo/

  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Show installed versions
        run: |
          python -c "import skvideo; print('skvideo', skvideo.__version__)"
          python -c "import numpy, scipy, PIL; print('numpy', numpy.__version__); print('scipy', scipy.__version__); print('pillow', PIL.__version__)"
          ffmpeg -version | head -1

      - name: Run tests
        run: pytest -v skvideo/tests
