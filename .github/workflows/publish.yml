# Publish to PyPI via Trusted Publishing (OIDC) -- no API token stored.
#
# Inert until a trusted publisher is configured on PyPI for this repo:
#   PyPI project 'scikit-video' -> Settings -> Publishing -> add
#   GitHub publisher (owner: scikit-video, repo: scikit-video,
#   workflow: publish.yml, environment: pypi).
# Once that exists, publishing = create a GitHub release (or run this
# workflow manually against a tag).
#
# See https://docs.pypi.org/trusted-publishers/
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # mandatory for PyPI Trusted Publishing (OIDC)
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
